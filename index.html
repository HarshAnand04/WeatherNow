<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="animation-container"></div>

    <div class="weather-app">
        <div class="app-header">
            <h1>⛅ Weather</h1>
            <button id="unit-toggle" title="Toggle °C / °F">°C</button>
        </div>

        <div class="search-container">
            <input type="text" id="city" placeholder="Search city..." autocomplete="off" />
            <button id="search-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
        </div>

        <div id="error-message" class="error-message"></div>
        <div id="loading" class="loading hidden">Fetching weather...</div>

        <div id="weather-info" class="weather-info hidden">
            <!-- Primary Info -->
            <div class="weather-primary">
                <div class="weather-icon-wrap">
                    <img id="weather-icon" src="" alt="weather icon" />
                </div>
                <div class="weather-main">
                    <h2 id="city-name"></h2>
                    <p id="country-region"></p>
                    <p id="weather-condition"></p>
                </div>
            </div>

            <div class="temp-display">
                <span id="temperature"></span>
                <span id="feels-like"></span>
            </div>

            <!-- Detail Grid -->
            <div class="weather-grid">
                <div class="grid-item">
                    <span class="grid-icon">💧</span>
                    <span class="grid-label">Humidity</span>
                    <span id="humidity" class="grid-value"></span>
                </div>
                <div class="grid-item">
                    <span class="grid-icon">💨</span>
                    <span class="grid-label">Wind</span>
                    <span id="wind-speed" class="grid-value"></span>
                </div>
                <div class="grid-item">
                    <span class="grid-icon">🌡️</span>
                    <span class="grid-label">Min / Max</span>
                    <span id="temp-range" class="grid-value"></span>
                </div>
                <div class="grid-item">
                    <span class="grid-icon">👁️</span>
                    <span class="grid-label">Visibility</span>
                    <span id="visibility" class="grid-value"></span>
                </div>
                <div class="grid-item">
                    <span class="grid-icon">🔵</span>
                    <span class="grid-label">Pressure</span>
                    <span id="pressure" class="grid-value"></span>
                </div>
                <div class="grid-item">
                    <span class="grid-icon">☁️</span>
                    <span class="grid-label">Cloud Cover</span>
                    <span id="cloud-cover" class="grid-value"></span>
                </div>
            </div>

            <!-- Sunrise / Sunset -->
            <div class="sun-times">
                <div class="sun-item">
                    <span>🌅 Sunrise</span>
                    <span id="sunrise"></span>
                </div>
                <div class="sun-divider"></div>
                <div class="sun-item">
                    <span>🌇 Sunset</span>
                    <span id="sunset"></span>
                </div>
            </div>

            <p id="last-updated" class="last-updated"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
